<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - sports-game-outcome-predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .login-card {
            border-radius: 15px;
        }

        .brand-title {
            font-weight: bold;
            color: #2a5298;
        }

        .btn-custom {
            background-color: #2a5298;
            border: none;
        }

        .btn-custom:hover {
            background-color: #1e3c72;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card shadow-lg p-4" style="width: 380px;">

        <h4 class="text-center brand-title mb-2">
            ⚽ sports-game-outcome-predictor
        </h4>
        <p class="text-center text-muted mb-4">
            Accedi al tuo account
        </p>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Inserisci username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Inserisci password" required>
            </div>

            <button type="submit" class="btn btn-custom w-100 text-white">
                Accedi
            </button>
        </form>

    </div>
</div>

</body>
</html>
