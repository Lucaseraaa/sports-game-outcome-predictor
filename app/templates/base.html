<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}sports-game-outcome-predictor{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            width: 220px;
            background: #1e3c72;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            transition: transform 0.3s ease;
            padding-top: 60px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }

        .sidebar a:hover {
            background: #2a5298;
        }

        /* SIDEBAR CLOSED */
        .sidebar.closed {
            transform: translateX(-220px);
        }

        /* HEADER */
        .header {
            height: 60px;
            background: #2a5298;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-left: 220px;
            transition: margin-left 0.3s ease;
        }

        /* CONTENT */
        .content {
            margin-left: 220px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        /* WHEN SIDEBAR CLOSED */
        .sidebar.closed ~ .header {
            margin-left: 0;
        }

        .sidebar.closed ~ .content {
            margin-left: 0;
        }

        /* TOGGLE BUTTON */
        .toggle-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-220px);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .header {
                margin-left: 0;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <h5 class="text-center">Menu</h5>

    <a href="#">🏠 Home</a>
    <a href="#">📊 Dashboard</a>
    <a href="#">⚙️ Impostazioni</a>
</div>

<!-- HEADER -->
<div class="header">
    
    <!-- Hamburger -->
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

    <div>
        ⚽ <strong>sports-game-outcome-predictor</strong>
    </div>

    <div>
        👤 {{ session.get("user", "Guest") }}
    </div>
</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- JS -->
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");

        // desktop + mobile support
        sidebar.classList.toggle("closed");
        sidebar.classList.toggle("open");
    }
</script>

</body>
</html>
